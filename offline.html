<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#000000">
  <title>Formaibly - Offline</title>
  <style>
    :root {
      color-scheme: light;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #FFFFFF;
      color: #000000;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      border: 1px solid #000000;
      padding: 24px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 24px;
    }
    p {
      margin: 0;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Formaibly</h1>
    <p>You are currently offline. Reconnect to continue using live features.</p>
  </div>
</body>
</html>
